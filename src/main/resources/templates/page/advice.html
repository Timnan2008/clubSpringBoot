<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="/other%20photo/WFL-logo.png">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/advice_style.css?v=5">
  <title th:text="#{advice.title}">意见箱</title>
</head>
<body>
  <div th:replace="fragments/navbar :: navbar"></div>

  <div class="advice-page">

    <div class="advice-header">
      <img class="advice-icon-img" src="/other%20photo/advice-logo.png" alt="青源智造" />
      <h1 th:text="#{advice.title}">意见箱</h1>
      <p th:text="#{advice.subtitle}">你的声音，是我们前进的方向</p>
    </div>

    <div class="advice-card">
      <form id="form">
        <div class="form-row" id="identity-row">
          <div class="form-group">
            <label for="name" th:text="#{advice.name}">姓名</label>
            <input id="name" type="text" th:placeholder="#{advice.name.placeholder}" placeholder="请输入姓名" />
          </div>
          <div class="form-group">
            <label for="number" th:text="#{advice.student_id}">学号</label>
            <input id="number" type="number" th:placeholder="#{advice.student_id.placeholder}" placeholder="请输入学号" />
          </div>
        </div>

        <div class="form-group">
          <label th:text="#{advice.category}">分类</label>
          <div class="category-tags">
            <input type="radio" name="cat" id="cat-general" value="general" checked hidden />
            <label for="cat-general" class="tag tag-general">💡 <span th:text="#{advice.category.general}">一般建议</span></label>
            <input type="radio" name="cat" id="cat-bug" value="bug" hidden />
            <label for="cat-bug" class="tag tag-bug">🐛 <span th:text="#{advice.category.bug}">Bug</span></label>
            <input type="radio" name="cat" id="cat-feature" value="feature" hidden />
            <label for="cat-feature" class="tag tag-feature">✨ <span th:text="#{advice.category.feature}">功能请求</span></label>
          </div>
        </div>

        <div class="form-group">
          <label for="message" th:text="#{advice.message}">内容</label>
          <textarea id="message" maxlength="500" th:placeholder="#{advice.message.placeholder}" placeholder="请输入您的建议或反馈..."></textarea>
          <div class="char-bar"><div class="char-progress" id="charProgress"></div></div>
          <div class="char-count" id="charCount">0 / 500</div>
        </div>

        <label class="anon-check">
          <input id="anon" type="checkbox" />
          <span th:text="#{advice.anonymous}">匿名提交</span>
        </label>

        <div class="captcha-section">
          <div class="captcha-label">🔒 <span th:text="#{advice.verify.title}">人机验证</span></div>
          <input type="hidden" id="csrfToken" value="${csrfToken}" />
          <input type="text" id="honeypot" style="display:none" tabindex="-1" autocomplete="off" />
          <div class="captcha-row">
            <div class="verify-shell">
              <div id="verify-equation" class="verify-equation">3 + 4 = ?</div>
              <button type="button" id="refresh-captcha" class="btn-refresh" th:title="#{advice.verify.refresh}" title="刷新验证码">↻</button>
            </div>
          </div>
          <input id="captchaAns" type="text" inputmode="numeric" th:placeholder="#{advice.verify.placeholder}" placeholder="请输入答案" />
          <div id="anti-spam-tip" class="error-tip"></div>
        </div>

        <div class="form-actions">
          <a class="btn-secondary" th:href="@{/page/suggestion/history}" th:text="#{advice.history.link}">查看历史记录</a>
          <button class="btn-submit" type="submit" id="submit-btn" th:text="#{advice.submit}">提交反馈</button>
        </div>
      </form>
    </div>

  </div>

<div id="advice-toast" class="advice-toast"></div>

<script th:inline="javascript">
const i18n = {
  submitting: /*[[#{advice.submitting}]]*/ '正在提交...',
  submit: /*[[#{advice.submit}]]*/ '提交反馈',
  verifyBot: /*[[#{advice.validation.bot}]]*/ '验证失败。',
  verifyFrequent: /*[[#{advice.validation.frequent}]]*/ '提交过于频繁，请等待 {0} 秒后再试。',
  verifyTooMany: /*[[#{advice.validation.too_many}]]*/ '尝试次数过多，请稍后再试。',
  verifyWrong: /*[[#{advice.validation.wrong}]]*/ '验证答案错误，请重试。',
  short: /*[[#{advice.validation.short}]]*/ '请至少输入 5 个字。',
  success: /*[[#{advice.validation.success}]]*/ '提交成功！',
  error: /*[[#{advice.validation.error}]]*/ '操作失败：'
};
</script>
<script>
const API_BASE_URL = '/api/suggestion';
let verifyAnswer = 0;
let lastSubmitTime = 0;
let submitAttempts = 0;
const MIN_SUBMIT_INTERVAL = 60000;
const MAX_ATTEMPTS = 3;

function showToast(message, type) {
  const el = document.getElementById('advice-toast');
  el.textContent = (type === 'success' ? '✅ ' : type === 'error' ? '❌ ' : '⚠️ ') + message;
  el.className = 'advice-toast ' + type;
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(function () { el.classList.remove('show'); }, 3000);
}

function setTip(message) {
  const antiSpamTip = document.getElementById('anti-spam-tip');
  antiSpamTip.textContent = message;
  antiSpamTip.style.display = message ? 'block' : 'none';
}

function generateCaptcha() {
  const left = Math.floor(Math.random() * 8) + 2;
  const right = Math.floor(Math.random() * 8) + 2;
  verifyAnswer = left + right;
  document.getElementById('verify-equation').textContent = left + ' + ' + right + ' = ?';
}

document.getElementById('refresh-captcha').addEventListener('click', generateCaptcha);

document.getElementById('message').addEventListener('input', function() {
  const count = this.value.length;
  document.getElementById('charCount').textContent = count + ' / 500';
  const progress = document.getElementById('charProgress');
  progress.style.width = (count / 500 * 100) + '%';
  if (count > 450) {
    progress.style.background = '#ef4444';
    document.getElementById('charCount').style.color = '#ef4444';
  } else {
    progress.style.background = '';
    document.getElementById('charCount').style.color = '';
  }
});

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const submitBtn = document.getElementById('submit-btn');
  const honeypot = document.getElementById('honeypot').value;

  if (honeypot.trim() !== '') {
    showToast(i18n.verifyBot, 'error');
    return;
  }

  const now = Date.now();
  if (now - lastSubmitTime < MIN_SUBMIT_INTERVAL) {
    const remainingTime = Math.ceil((MIN_SUBMIT_INTERVAL - (now - lastSubmitTime)) / 1000);
    setTip(i18n.verifyFrequent.replace('{0}', remainingTime));
    return;
  }

  if (submitAttempts >= MAX_ATTEMPTS) {
    setTip(i18n.verifyTooMany);
    submitBtn.disabled = true;
    setTimeout(() => {
      submitBtn.disabled = false;
      submitAttempts = 0;
      setTip('');
    }, MIN_SUBMIT_INTERVAL);
    return;
  }

  const answer = document.getElementById('captchaAns').value.trim();
  if (Number(answer) !== verifyAnswer) {
    setTip(i18n.verifyWrong);
    generateCaptcha();
    submitAttempts++;
    return;
  }

  const msg = document.getElementById('message').value.trim();
  if (msg.length < 5) {
    showToast(i18n.short, 'warn');
    return;
  }

  const name = document.getElementById('name').value.trim();
  const category = document.querySelector('input[name="cat"]:checked').value;
  const anon = document.getElementById('anon').checked;

  const suggestionData = {
    title: category,
    context: msg,
    isAnonymous: anon,
    name: anon ? '' : name
  };

  submitBtn.disabled = true;
  submitBtn.textContent = i18n.submitting;
  submitBtn.style.pointerEvents = 'none';
  submitBtn.classList.add('loading');
  setTip('');

  try {
    const response = await fetch(`${API_BASE_URL}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(suggestionData)
    });

    const result = await response.json();
    if (!response.ok) {
      throw new Error(result.message || 'submit failed');
    }

    showToast(i18n.success, 'success');
    document.getElementById('form').reset();
    document.getElementById('charCount').textContent = '0 / 500';
    document.getElementById('charProgress').style.width = '0';
    generateCaptcha();
    lastSubmitTime = now;
    submitAttempts = 0;
  } catch (error) {
    showToast(i18n.error + error.message, 'error');
    submitAttempts++;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = i18n.submit;
    submitBtn.style.pointerEvents = '';
    submitBtn.classList.remove('loading');
  }
});

document.getElementById('anon').addEventListener('change', function() {
  const row = document.getElementById('identity-row');
  if (this.checked) {
    row.style.display = 'none';
    document.getElementById('name').value = '';
    document.getElementById('number').value = '';
  } else {
    row.style.display = '';
  }
});

document.addEventListener('DOMContentLoaded', generateCaptcha);
</script>
</body>
</html>
