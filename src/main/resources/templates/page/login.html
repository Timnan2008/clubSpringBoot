<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/other%20photo/WFL-logo.png" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/login_style.css" />
    <title th:text="#{login.pageTitle}">登录 / 注册</title>
  </head>
  <body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div th:replace="fragments/particle :: particle"></div>

    <!-- 把 i18n 文字注入 JS 变量 -->
    <script th:inline="javascript">
      const I18N = {
        login: /*[[#{login.tab.login}]]*/ "登录",
        register: /*[[#{login.tab.register}]]*/ "注册",
        errorEmail: /*[[#{login.error.email}]]*/ "请输入有效邮箱",
        errorCode: /*[[#{login.error.code}]]*/ "请输入6位验证码",
        errorPwd: /*[[#{login.error.pwd}]]*/ "请输入密码",
        errorRole: /*[[#{login.error.role}]]*/ "请选择身份",
        sendCode: /*[[#{login.btn.sendCode}]]*/ "发送验证码",
        resend: /*[[#{login.btn.resend}]]*/ "重新发送",
        submitting: /*[[#{login.btn.submitting}]]*/ "提交中...",
        loginSuccess: /*[[#{login.msg.loginSuccess}]]*/ "登录成功！",
        loginFail: /*[[#{login.msg.loginFail}]]*/ "邮箱或密码错误",
      };
    </script>

    <div class="login-container">
      <!-- Tab 切换 -->
      <div class="tab-bar">
        <button
          class="tab-btn active"
          id="tab-login"
          onclick="switchTab('login')"
          th:text="#{login.tab.login}"
        >
          登录
        </button>
        <button
          class="tab-btn"
          id="tab-register"
          onclick="switchTab('register')"
          th:text="#{login.tab.register}"
        >
          注册
        </button>
      </div>

      <!-- ===== 登录表单 ===== -->
      <div id="form-login">
        <div class="row email-row">
          <input
            id="login-email"
            type="email"
            th:placeholder="#{login.field.email}"
          />
        </div>
        <input
          id="login-password"
          type="password"
          th:placeholder="#{login.field.password}"
        />
        <button
          class="submit-btn"
          onclick="doLogin()"
          th:text="#{login.tab.login}"
        >
          登录
        </button>
      </div>

      <!-- ===== 注册表单 ===== -->
      <div id="form-register" style="display: none">
        <div class="row">
          <input id="name" type="text" th:placeholder="#{login.field.nameCn}" />
          <input
            id="nameEn"
            type="text"
            th:placeholder="#{login.field.nameEn}"
          />
        </div>
        <div class="row email-row">
          <input
            id="email"
            type="email"
            th:placeholder="#{login.field.email}"
          />
          <button
            id="sendCodeBtn"
            class="send-code-btn"
            onclick="sendEmailCode()"
            th:text="#{login.btn.sendCode}"
          >
            发送验证码
          </button>
        </div>
        <input
          id="code"
          type="text"
          th:placeholder="#{login.field.code}"
          maxlength="6"
        />
        <input
          id="password"
          type="password"
          th:placeholder="#{login.field.password}"
        />
        <select id="role" onchange="onRoleChange()">
          <option
            value=""
            disabled
            selected
            th:text="#{login.field.rolePlaceholder}"
          >
            请选择身份
          </option>
          <option value="teacher" th:text="#{login.role.teacher}">老师</option>
          <option value="user" th:text="#{login.role.student}">学生</option>
        </select>
        <div id="dynamic-area"></div>
        <button
          class="submit-btn"
          onclick="validateForm()"
          th:text="#{login.tab.register}"
        >
          注册
        </button>
      </div>
    </div>

    <script>
      /* ───── Tab 切换 ───── */
      function switchTab(tab) {
        document.getElementById("form-login").style.display =
          tab === "login" ? "" : "none";
        document.getElementById("form-register").style.display =
          tab === "register" ? "" : "none";
        document
          .getElementById("tab-login")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("tab-register")
          .classList.toggle("active", tab === "register");
      }

      /* ───── 登录 ───── */
      function doLogin() {
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;

        if (!isValidEmail(email)) {
          alert(I18N.errorEmail);
          return;
        }
        if (!password) {
          alert(I18N.errorPwd);
          return;
        }

        const btn = document.querySelector("#form-login .submit-btn");
        btn.disabled = true;
        btn.textContent = I18N.submitting;

        fetch("/api/user/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        })
          .then((r) => r.json())
          .then((data) => {
            if (data.code === 200) {
              alert(I18N.loginSuccess);
              window.location.href = "/page/index";
            } else {
              alert(data.message || I18N.loginFail);
            }
          })
          .catch(() => alert(I18N.loginFail))
          .finally(() => {
            btn.disabled = false;
            btn.textContent = I18N.login;
          });
      }

      /* ───── 注册：发送验证码 ───── */
      let countdownInterval;
      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function sendEmailCode() {
        const email = document.getElementById("email").value;
        if (!isValidEmail(email)) {
          alert(I18N.errorEmail);
          return;
        }
        const btn = document.getElementById("sendCodeBtn");
        btn.disabled = true;
        fetch("/api/email/send?email=" + encodeURIComponent(email), {
          method: "POST",
        })
          .then((r) => r.json())
          .then((data) => {
            alert(data.message);
            let countdown = 60;
            btn.textContent = I18N.resend + "(" + countdown + ")";
            countdownInterval = setInterval(() => {
              countdown--;
              btn.textContent = I18N.resend + "(" + countdown + ")";
              if (countdown <= 0) {
                clearInterval(countdownInterval);
                btn.textContent = I18N.sendCode;
                btn.disabled = false;
              }
            }, 1000);
          })
          .catch(() => {
            alert("发送失败");
            btn.disabled = false;
          });
      }

      /* ───── 注册：提交 ───── */
      function validateForm() {
        const email = document.getElementById("email").value;
        const code = document.getElementById("code").value;
        if (!isValidEmail(email)) {
          alert(I18N.errorEmail);
          return;
        }
        if (code.length !== 6) {
          alert(I18N.errorCode);
          return;
        }
        const role = document.getElementById("role").value;
        if (!role) {
          alert(I18N.errorRole);
          return;
        }

        fetch(
          "/api/email/verify?email=" +
            encodeURIComponent(email) +
            "&code=" +
            encodeURIComponent(code),
          { method: "POST" },
        )
          .then((r) => r.json())
          .then((data) => {
            if (data.success || data.message === "验证成功") {
              sendPost();
            } else {
              alert("验证码错误或已过期");
            }
          })
          .catch((err) => console.error(err));
      }

      function getValue(id) {
        const el = document.getElementById(id);
        if (!el) return null;
        return el.type === "checkbox" ? el.checked : el.value;
      }

      function getSelectedClubIds(title) {
        return [
          ...document.querySelectorAll(`input[name="${title}"]:checked`),
        ].map((i) => Number(i.value));
      }

      function getFormDataByRole(role) {
        if (role === "teacher") {
          return {
            teacherName: getValue("name"),
            teacherNameEn: getValue("nameEn"),
            teacherPassword: getValue("password"),
            teacherEmail: getValue("email"),
            clubs: getSelectedClubIds("负责的社团（可多选）"),
            userType: "teacher",
          };
        }
        if (role === "user") {
          return {
            username: getValue("name"),
            usernameEn: getValue("nameEn"),
            password: getValue("password"),
            email: getValue("email"),
            userType: "user",
          };
        }
      }

      function sendPost() {
        const role = document.getElementById("role").value;
        const json = getFormDataByRole(role);
        fetch("/api/user/add/" + role, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(json),
        })
          .then((r) => r.json())
          .then((data) => {
            alert(data.message);
          })
          .catch((err) => console.error(err));
      }
    </script>

    <script type="module">
      function onRoleChange() {
        const role = document.getElementById("role").value;
        const area = document.getElementById("dynamic-area");
        area.innerHTML = "";
        if (role === "teacher") {
          area.appendChild(createClubButton("负责的社团（可多选）", true));
        }
      }
      window.onRoleChange = onRoleChange;

      function createClubButton(title, multiple) {
        const container = document.createElement("div");
        const btn = document.createElement("button");
        btn.textContent = title;
        btn.style.marginBottom = "5px";
        btn.className = "club-select-btn";
        btn.addEventListener("click", () => {
          listDiv.style.display =
            listDiv.style.display === "block" ? "none" : "block";
        });
        container.appendChild(btn);

        const listDiv = document.createElement("div");
        listDiv.className = "club-list-container";
        listDiv.style.display = "none";

        fetch("/api/club/all")
          .then((j) => j.json())
          .then((result) => {
            result.data.forEach((c) => {
              const item = document.createElement("label");
              item.className = "club-item";
              const input = document.createElement("input");
              input.className = "club-checkbox";
              input.type = multiple ? "checkbox" : "radio";
              input.name = title;
              input.value = c.id;
              const img = document.createElement("img");
              img.src = c.clubItem;
              img.className = "club-avatar";
              const textDiv = document.createElement("div");
              textDiv.className = "club-text";
              const cn = document.createElement("div");
              cn.className = "club-name-cn";
              cn.textContent = c.clubName;
              const en = document.createElement("div");
              en.className = "club-name-en";
              en.textContent = c.clubNameEn;
              textDiv.appendChild(cn);
              textDiv.appendChild(en);
              item.appendChild(input);
              item.appendChild(img);
              item.appendChild(textDiv);
              listDiv.appendChild(item);
            });
          });
        container.appendChild(listDiv);
        return container;
      }
    </script>
  </body>
</html>
