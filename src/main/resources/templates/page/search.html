<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/other%20photo/WFL-logo.png">
    <meta name="description" content="QPWFLHS Club Search Results">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/index_style.css">
    <title>搜索结果</title>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div th:replace="fragments/notice :: notice"></div>

    <!-- Ultra-Glass Parallax Matrix background -->
    <div class="bg-viewport" aria-hidden="true"></div>
    <script src="/javascript/ibm-background.js"></script>

    <!-- Scrollable page content -->
    <div class="page-content">
        <!-- Search Results -->
        <section class="search-results-section glass-card">
            <h2 class="section-title">🔍 搜索结果</h2>
            <div id="search-results" class="clubs-grid">
                <!-- Results will be loaded here -->
            </div>
            <div id="no-results" class="no-results-message" style="display: none;">
                <p>没有找到匹配的社团</p>
            </div>
        </section>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const keyword = urlParams.get('keyword');

        const loadingEl = document.createElement('div');
        loadingEl.className = 'search-loading';
        loadingEl.innerHTML = '<div class="spinner"></div><span>正在搜索，请稍候...</span>';

        const container = document.getElementById('search-results');
        const noResults = document.getElementById('no-results');

        function showNoResults(message) {
            noResults.textContent = message;
            noResults.style.display = 'block';
        }

        function hideNoResults() {
            noResults.style.display = 'none';
        }

        if (keyword) {
            container.innerHTML = '';
            container.appendChild(loadingEl);
            noResults.style.display = 'none';

            fetch(`/api/club/search?keyword=${encodeURIComponent(keyword)}`)
                .then(response => response.json())
                .then(data => {
                    container.removeChild(loadingEl);
                    if (data.code === 200 && data.data && data.data.length > 0) {
                        renderResults(data.data);
                    } else {
                        showNoResults('未找到匹配“' + keyword + '”的社团。');
                    }
                })
                .catch(error => {
                    console.error('Search error:', error);
                    container.removeChild(loadingEl);
                    showNoResults('搜索失败，请稍后重试。');
                });
        } else {
            showNoResults('请输入关键词进行搜索。');
        }

        function renderResults(clubs) {
            container.innerHTML = clubs.map(club => `
                <div class="club-card glass-card" onclick="window.location.href='/${club.detailPath}'">
                    <div class="club-logo">
                        <img src="${club.logo || '/other%20photo/default-logo.png'}" alt="${club.name}" />
                    </div>
                    <div class="club-info">
                        <h3 class="club-name">${club.name}</h3>
                        <p class="club-brief">${club.brief || club.description || ''}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
