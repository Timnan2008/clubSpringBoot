<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/other%20photo/WFL-logo.png">
    <meta name="description" content="QPWFLHS Club - Discover and explore campus clubs at Shanghai Qingpu World Foreign Language High School.">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/index_style.css">
    <title th:text="#{nav.home}">首页</title>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>
    <div th:replace="fragments/notice :: notice"></div>

    <!-- Ultra-Glass Parallax Matrix background -->
    <div class="bg-viewport" aria-hidden="true"></div>
    <script src="/javascript/ibm-background.js"></script>

    <!-- Scrollable page content -->
    <div class="page-content">

        <!-- Hero -->
        <section class="hero-section">
            <div class="eyebrow">QPWFLHS CLUBS</div>
            <h1 th:text="#{index.title}">发现你真正想加入的社团</h1>
            <p class="hero-subtitle" th:text="#{index.subtitle}">探索丰富的校园社团活动，找到属于你的热爱与归属。</p>
            <a href="/page/club-type/creativity" class="hero-btn" th:text="#{index.btn}">浏览全部社团</a>
        </section>

        <!-- Notice Board -->
        <section class="notice-section glass-card">
            <h2 class="section-title">📋 <span th:text="#{index.notice.title}">公告栏</span></h2>
            <div class="notice-board">
                <div class="notice-important" th:text="#{index.notice.1}">恭喜青浦世外高中社团官网正式上线新版本！</div>
                <div class="notice" th:text="#{index.notice.2}">意见箱已上线，欢迎提交建议</div>
                <div class="notice" th:text="#{index.notice.3}">登录注册功能暂不开放</div>
            </div>
        </section>

        <!-- Excellent Clubs -->
        <section class="clubs-section glass-card">
            <h2 class="section-title">⭐ <span th:text="#{index.clubs.title}">优秀社团展示</span></h2>
            <div class="scroll-wrapper">
                <div class="fade-left"></div>
                <div class="fade-right"></div>
                <div id="club-scroll" class="scroll-container"></div>
            </div>
        </section>

        <footer class="site-footer">
            <a href="https://beian.miit.gov.cn">沪ICP备2025137067号</a>
        </footer>
    </div>

    <script th:inline="javascript">
        const btnText = /*[[#{button.viewDetail}]]*/ '查看详情';
    </script>
    <script>
        fetch('/api/club/all')
            .then(r => r.json())
            .then(result => {
                const data = Array.isArray(result.data) ? result.data : [];
                const container = document.getElementById('club-scroll');
                const greats = data.filter(c => c.greatClub);
                const source = greats.length > 0 ? greats : data;
                const items = [...source, ...source];
                container.innerHTML = '';
                items.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML =
                        '<img src="' + c.clubItem + '" alt="' + c.clubName + '">' +
                        '<div class="card-content">' +
                        '<h2>' + c.clubName + '</h2>' +
                        '<p>' + c.sortDescription + '</p>' +
                        '<a class="button" href="/' + c.clubURL + '">' + btnText + '</a>' +
                        '</div>';
                    container.appendChild(card);
                });
            });
    </script>
</body>
</html>
