<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="navbar">
      <header class="navbar">
        <!-- 左侧：学校名 -->
        <div class="navbar-left">
          <img
            src="/other%20photo/WFL-logo.png"
            class="navbar-logo"
            id="navbar-logo-img"
            alt="logo"
          />

          <div class="school-name-block">
            <div class="school-cn" th:text="#{school.cn}"></div>
            <div class="school-en" th:text="#{school.en}"></div>
          </div>
        </div>

        <!-- 中间：搜索框 -->
        <div class="navbar-center">
          <div class="search">
            <input
              class="search__input"
              type="text"
              id="search-input"
              th:placeholder="#{nav.search.placeholder}"
            />
            <button class="search__button" id="search-button" type="button">
              <svg class="search__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 21L16.5 16.5M19 11C19 15.4183 15.4183 19 11 19C6.58172 19 3 15.4183 3 11C3 6.58172 6.58172 3 11 3C15.4183 3 19 6.58172 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="search-dropdown" id="search-dropdown"></div>
          </div>
        </div>

        <!-- 右侧：导航链接 -->
        <nav class="navbar-links">
          <a th:href="@{/page/index}">
            <span th:text="#{nav.home}"></span>
          </a>

          <div class="dropdown">
            <button
              type="button"
              class="dropbtn"
              aria-expanded="false"
              th:text="#{nav.allClubs}"
            ></button>

            <div class="dropdown-content">
              <a th:href="@{/page/club-type/creativity}"
                ><span th:text="#{nav.club.creativity}"></span
              ></a>
              <a th:href="@{/page/club-type/activity}"
                ><span th:text="#{nav.club.activity}"></span
              ></a>
              <a th:href="@{/page/club-type/service}"
                ><span th:text="#{nav.club.service}"></span
              ></a>
              <a th:href="@{/page/club-type/study}"
                ><span th:text="#{nav.club.study}"></span
              ></a>
            </div>
          </div>

          <a th:href="@{/page/suggestion}" th:text="#{nav.suggestion}"></a>

          <!-- 语言切换 -->
          <div class="dropdown">
            <button type="button" class="dropbtn" aria-expanded="false">
              🌐
            </button>
            <div class="dropdown-content">
              <a href="?lang=zh" th:text="#{nav.lang.zh}"></a>
              <a href="?lang=en" th:text="#{nav.lang.en}"></a>
            </div>
          </div>

          <!-- 登录/注册按钮 -->
          <a
            th:href="@{/page/user/login}"
            class="navbar-login-btn"
            th:text="#{nav.login}"
          ></a>
        </nav>
      </header>

      <script>
        (function () {
          const logo = document.getElementById("navbar-logo-img");
          if (!logo || logo.dataset.processed === "true") return;

          function stripBackground() {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            const w = logo.naturalWidth;
            const h = logo.naturalHeight;
            if (!w || !h) return;

            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(logo, 0, 0);

            const imageData = ctx.getImageData(0, 0, w, h);
            const d = imageData.data;
            for (let i = 0; i < d.length; i += 4) {
              const r = d[i],
                g = d[i + 1],
                b = d[i + 2];
              if (
                r > 210 &&
                g > 210 &&
                b > 210 &&
                Math.max(r, g, b) - Math.min(r, g, b) < 26
              ) {
                d[i + 3] = 0;
              }
            }

            ctx.putImageData(imageData, 0, 0);
            logo.src = canvas.toDataURL("image/png");
            logo.dataset.processed = "true";
          }

          if (logo.complete) {
            stripBackground();
          } else {
            logo.addEventListener("load", stripBackground, { once: true });
          }
        })();

        (function () {
          const dropdowns = Array.from(
            document.querySelectorAll(".navbar .dropdown"),
          );

          if (!dropdowns.length) return;

          function closeAll(except) {
            dropdowns.forEach((dropdown) => {
              const button = dropdown.querySelector(".dropbtn");
              if (dropdown !== except) {
                dropdown.classList.remove("open");
                if (button) {
                  button.setAttribute("aria-expanded", "false");
                }
              }
            });
          }

          dropdowns.forEach((dropdown) => {
            const button = dropdown.querySelector(".dropbtn");
            const menu = dropdown.querySelector(".dropdown-content");

            if (!button || !menu) return;

            button.addEventListener("click", function (event) {
              event.preventDefault();
              event.stopPropagation();
              const isOpen = dropdown.classList.contains("open");
              closeAll(dropdown);
              dropdown.classList.toggle("open", !isOpen);
              button.setAttribute("aria-expanded", String(!isOpen));
            });

            menu.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", function () {
                dropdown.classList.remove("open");
                button.setAttribute("aria-expanded", "false");
              });
            });
          });

          document.addEventListener("click", function () {
            closeAll();
          });

          document.addEventListener(
            "touchstart",
            function (event) {
              if (!event.target.closest(".navbar .dropdown")) {
                closeAll();
              }
            },
            { passive: true },
          );

          document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
              closeAll();
            }
          });
        })();

        // Search functionality
        (function () {
          const searchInput = document.getElementById('search-input');
          const searchButton = document.getElementById('search-button');
          const searchDropdown = document.getElementById('search-dropdown');

          if (!searchInput || !searchButton || !searchDropdown) return;

          let debounceTimer;

          function performSearch(keyword) {
            if (!keyword.trim()) {
              searchDropdown.style.display = 'none';
              return;
            }

            fetch(`/api/club/search?keyword=${encodeURIComponent(keyword)}`)
              .then(response => response.json())
              .then(data => {
                if (data.code === 200 && data.data && data.data.length > 0) {
                  renderDropdown(data.data);
                  searchDropdown.style.display = 'block';
                } else {
                  searchDropdown.innerHTML = '<div class="no-results">没有找到匹配的社团</div>';
                  searchDropdown.style.display = 'block';
                }
              })
              .catch(error => {
                console.error('Search error:', error);
                searchDropdown.style.display = 'none';
              });
          }

          function renderDropdown(clubs) {
            const html = clubs.map(club => `
              <div class="search-item" data-id="${club.id}">
                <div style="display: flex; align-items: center; gap: 10px;">
                  <img src="${club.logo || '/other%20photo/default-logo.png'}" alt="${club.name}" style="width: 40px; height: 40px; border-radius: 8px; object-fit: cover;">
                  <div>
                    <div style="font-weight: 500; color: var(--text-primary);">${club.name}</div>
                    <div style="font-size: 12px; color: var(--text-muted);">${club.description || ''}</div>
                  </div>
                </div>
              </div>
            `).join('');
            searchDropdown.innerHTML = html;

            // Add click handlers
            searchDropdown.querySelectorAll('.search-item').forEach(item => {
              item.addEventListener('click', function() {
                const clubId = this.dataset.id;
                window.location.href = `/page/club/${clubId}`;
              });
            });
          }

          function debounceSearch() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
              const keyword = searchInput.value;
              performSearch(keyword);
            }, 300);
          }

          searchInput.addEventListener('input', debounceSearch);

          searchInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
              event.preventDefault();
              const keyword = searchInput.value.trim();
              if (keyword) {
                window.location.href = `/page/search?keyword=${encodeURIComponent(keyword)}`;
              }
            }
          });

          searchButton.addEventListener('click', function() {
            const keyword = searchInput.value.trim();
            if (keyword) {
              window.location.href = `/page/search?keyword=${encodeURIComponent(keyword)}`;
            }
          });

          // Hide dropdown when clicking outside
          document.addEventListener('click', function(event) {
            if (!event.target.closest('.search')) {
              searchDropdown.style.display = 'none';
            }
          });
        })();
      </script>
    </div>
  </body>
</html>
