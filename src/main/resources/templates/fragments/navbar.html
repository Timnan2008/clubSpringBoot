<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="navbar">
      <header class="navbar">
        <!-- 左侧：学校名 -->
        <div class="navbar-left">
          <img
            src="/other%20photo/WFL-logo.png"
            class="navbar-logo"
            id="navbar-logo-img"
            alt="logo"
          />

          <div class="school-name-block">
            <div class="school-cn" th:text="#{school.cn}"></div>
            <div class="school-en" th:text="#{school.en}"></div>
          </div>
        </div>

        <!-- 中间：搜索框 -->
        <div class="navbar-center">
          <div class="search">
            <input
              class="search__input"
              type="text"
              th:placeholder="#{nav.search.placeholder}"
            />
          </div>
        </div>

        <!-- 右侧：导航链接 -->
        <nav class="navbar-links">
          <a th:href="@{/page/index}">
            <span th:text="#{nav.home}"></span>
          </a>

          <div class="dropdown">
            <button
              type="button"
              class="dropbtn"
              aria-expanded="false"
              th:text="#{nav.allClubs}"
            ></button>

            <div class="dropdown-content">
              <a th:href="@{/page/club-type/creativity}"
                ><span th:text="#{nav.club.creativity}"></span
              ></a>
              <a th:href="@{/page/club-type/activity}"
                ><span th:text="#{nav.club.activity}"></span
              ></a>
              <a th:href="@{/page/club-type/service}"
                ><span th:text="#{nav.club.service}"></span
              ></a>
              <a th:href="@{/page/club-type/study}"
                ><span th:text="#{nav.club.study}"></span
              ></a>
            </div>
          </div>

          <a th:href="@{/page/suggestion}" th:text="#{nav.suggestion}"></a>

          <!-- 语言切换 -->
          <div class="dropdown">
            <button type="button" class="dropbtn" aria-expanded="false">
              🌐
            </button>
            <div class="dropdown-content">
              <a href="?lang=zh" th:text="#{nav.lang.zh}"></a>
              <a href="?lang=en" th:text="#{nav.lang.en}"></a>
            </div>
          </div>

          <!-- 登录/注册按钮 -->
          <a
            th:href="@{/page/user/login}"
            class="navbar-login-btn"
            th:text="#{nav.login}"
          ></a>
        </nav>
      </header>

      <script>
        (function () {
          const logo = document.getElementById("navbar-logo-img");
          if (!logo || logo.dataset.processed === "true") return;

          function stripBackground() {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            const w = logo.naturalWidth;
            const h = logo.naturalHeight;
            if (!w || !h) return;

            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(logo, 0, 0);

            const imageData = ctx.getImageData(0, 0, w, h);
            const d = imageData.data;
            for (let i = 0; i < d.length; i += 4) {
              const r = d[i],
                g = d[i + 1],
                b = d[i + 2];
              if (
                r > 210 &&
                g > 210 &&
                b > 210 &&
                Math.max(r, g, b) - Math.min(r, g, b) < 26
              ) {
                d[i + 3] = 0;
              }
            }

            ctx.putImageData(imageData, 0, 0);
            logo.src = canvas.toDataURL("image/png");
            logo.dataset.processed = "true";
          }

          if (logo.complete) {
            stripBackground();
          } else {
            logo.addEventListener("load", stripBackground, { once: true });
          }
        })();

        (function () {
          const dropdowns = Array.from(
            document.querySelectorAll(".navbar .dropdown"),
          );

          if (!dropdowns.length) return;

          function closeAll(except) {
            dropdowns.forEach((dropdown) => {
              const button = dropdown.querySelector(".dropbtn");
              if (dropdown !== except) {
                dropdown.classList.remove("open");
                if (button) {
                  button.setAttribute("aria-expanded", "false");
                }
              }
            });
          }

          dropdowns.forEach((dropdown) => {
            const button = dropdown.querySelector(".dropbtn");
            const menu = dropdown.querySelector(".dropdown-content");

            if (!button || !menu) return;

            button.addEventListener("click", function (event) {
              event.preventDefault();
              event.stopPropagation();
              const isOpen = dropdown.classList.contains("open");
              closeAll(dropdown);
              dropdown.classList.toggle("open", !isOpen);
              button.setAttribute("aria-expanded", String(!isOpen));
            });

            menu.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", function () {
                dropdown.classList.remove("open");
                button.setAttribute("aria-expanded", "false");
              });
            });
          });

          document.addEventListener("click", function () {
            closeAll();
          });

          document.addEventListener(
            "touchstart",
            function (event) {
              if (!event.target.closest(".navbar .dropdown")) {
                closeAll();
              }
            },
            { passive: true },
          );

          document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
              closeAll();
            }
          });
        })();
      </script>
    </div>
  </body>
</html>
